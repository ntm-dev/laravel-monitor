name: tests

on:
  push:
    branches:
      - master
      - "*.x"
  pull_request:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mysql:
    runs-on: ubuntu-22.04

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_RANDOM_ROOT_PASSWORD: yes
          MYSQL_DATABASE: monitor
          MYSQL_USER: monitor
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    strategy:
      fail-fast: true
      matrix:
        php: [8.1, 8.2, 8.3, 8.4]
        laravel: [10, 11, 12, 13]
        livewire: [3, 4]
        stability: [prefer-lowest, prefer-stable]
        include:
          - php: 8.5
            laravel: 13
            livewire: 4
            stability: prefer-stable
        exclude:
          - php: 8.1
            laravel: 11
          - php: 8.1
            laravel: 12
          - php: 8.1
            laravel: 13
          - php: 8.2
            laravel: 13
          - php: 8.4
            laravel: 10

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }} - Stability ${{ matrix.stability }} - MySQL 5.7

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, redis, pcntl, zip, relay
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install redis-cli
        run: sudo apt-get install -qq redis-tools

      - name: Require cachewerk/relay
        run: |
          composer require cachewerk/relay --no-interaction --no-update

      - name: Require Livewire ${{ matrix.livewire }}
        run: |
          composer require "livewire/livewire:${{ matrix.livewire == 3 && '^3.6.4' || '^4.0' }}" --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/phpunit -vvv
        env:
          DB_CONNECTION: mysql
          DB_DATABASE: monitor
          DB_USERNAME: monitor
          DB_PASSWORD: password
          DB_COLLATION: utf8mb4_unicode_ci

  mariadb:
    runs-on: ubuntu-22.04

    services:
      mysql:
        image: mariadb:10
        env:
          MYSQL_RANDOM_ROOT_PASSWORD: yes
          MYSQL_DATABASE: monitor
          MYSQL_USER: monitor
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    strategy:
      fail-fast: true
      matrix:
        php: [8.3]
        laravel: [12]
        livewire: [3, 4]
        stability: [prefer-stable]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }} - Stability ${{ matrix.stability }} - MariaDB 10

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, redis, pcntl, zip, relay
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install redis-cli
        run: sudo apt-get install -qq redis-tools

      - name: Require cachewerk/relay
        run: |
          composer require cachewerk/relay --no-interaction --no-update

      - name: Require Livewire ${{ matrix.livewire }}
        run: |
          composer require "livewire/livewire:${{ matrix.livewire == 3 && '^3.6.4' || '^4.0' }}" --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/phpunit -vvv
        env:
          DB_CONNECTION: mariadb
          DB_DATABASE: monitor
          DB_USERNAME: monitor
          DB_PASSWORD: password

  pgsql:
    runs-on: ubuntu-22.04

    services:
      postgresql:
        image: postgres:14
        env:
          POSTGRES_DB: monitor
          POSTGRES_USER: monitor
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: --health-cmd=pg_isready --health-interval=10s --health-timeout=5s --health-retries=3
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    strategy:
      fail-fast: true
      matrix:
        php: [8.3]
        laravel: [12]
        livewire: [3, 4]
        stability: [prefer-stable]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }} - Stability ${{ matrix.stability }} - PostgreSQL 14

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, redis, pcntl, zip, relay
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install redis-cli
        run: sudo apt-get install -qq redis-tools

      - name: Require cachewerk/relay
        run: |
          composer require cachewerk/relay --no-interaction --no-update

      - name: Require Livewire ${{ matrix.livewire }}
        run: |
          composer require "livewire/livewire:${{ matrix.livewire == 3 && '^3.6.4' || '^4.0' }}" --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/phpunit -vvv
        env:
          DB_CONNECTION: pgsql
          DB_DATABASE: monitor
          DB_USERNAME: monitor
          DB_PASSWORD: password

  sqlite:
    runs-on: ubuntu-22.04

    services:
      redis:
        image: redis
        ports:
          - 6379:6379
        options: --entrypoint redis-server

    strategy:
      fail-fast: true
      matrix:
        php: [8.3]
        laravel: [12]
        livewire: [3, 4]
        stability: [prefer-stable]

    name: PHP ${{ matrix.php }} - Laravel ${{ matrix.laravel }} - Livewire ${{ matrix.livewire }} - Stability ${{ matrix.stability }} - SQLite

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, redis, pcntl, zip, relay
          ini-values: error_reporting=E_ALL
          tools: composer:v2
          coverage: none

      - name: Install redis-cli
        run: sudo apt-get install -qq redis-tools

      - name: Require cachewerk/relay
        run: |
          composer require cachewerk/relay --no-interaction --no-update

      - name: Require Livewire ${{ matrix.livewire }}
        run: |
          composer require "livewire/livewire:${{ matrix.livewire == 3 && '^3.6.4' || '^4.0' }}" --no-interaction --no-update

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-interaction --no-progress --${{ matrix.stability }}

      - name: Execute tests
        run: vendor/bin/phpunit -vvv
        env:
          DB_CONNECTION: sqlite